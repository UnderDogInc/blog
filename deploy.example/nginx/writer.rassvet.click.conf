server {
    listen 80;
    listen [::]:80;
    server_name writer.rassvet.click;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name writer.rassvet.click;

    ssl_certificate     /etc/letsencrypt/live/writer.rassvet.click/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/writer.rassvet.click/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 64m;

    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        include /etc/nginx/snippets/rassvet-proxy.conf;
    }

    location /assets/ {
        proxy_pass http://127.0.0.1:4000/assets/;
        include /etc/nginx/snippets/rassvet-proxy.conf;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        include /etc/nginx/snippets/rassvet-proxy.conf;
    }
}
