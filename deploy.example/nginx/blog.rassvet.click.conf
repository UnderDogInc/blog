# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name blog.rassvet.click;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name blog.rassvet.click;

    # certbot certonly --webroot -w /var/www/certbot -d blog.rassvet.click
    ssl_certificate     /etc/letsencrypt/live/blog.rassvet.click/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.rassvet.click/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 32m;

    # Nest API (api2.rassvet.click на localhost:4000)
    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        include /etc/nginx/snippets/rassvet-proxy.conf;
    }

    location /assets/ {
        proxy_pass http://127.0.0.1:4000/assets/;
        include /etc/nginx/snippets/rassvet-proxy.conf;
    }

    # Nuxt blog (PM2 rassvet-blog → :3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/snippets/rassvet-proxy.conf;
    }
}
